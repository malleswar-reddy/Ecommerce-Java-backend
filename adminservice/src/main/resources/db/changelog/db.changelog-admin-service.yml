databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: malleswar
      preConditions:
        onFail: MARK_RAN
        not:
          tableExists:
            tableName: users
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
              - column:
                  name: email
                  type: VARCHAR(150)
              - column:
                  name: role
                  type: VARCHAR(50)
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP

  - changeSet:
      id: 002-add-email-index
      author: malleswar
      preConditions:
        onFail: MARK_RAN
        not:
          indexExists:
            indexName: idx_users_email
            tableName: users
      changes:
        - createIndex:
            indexName: idx_users_email
            tableName: users
            columns:
              - column:
                  name: email
  - changeSet:
      id: 002-added addressin users table
      author: malleswar
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: Address
                  type: varchar(255)